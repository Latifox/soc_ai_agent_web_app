# Python build for the api + agents services (Railway Root Directory = repo root "/").
# Forces the Python provider so the root package.json doesn't trick Railway into a Node build.
# The web service builds from apps/web and ignores this file.
#
# UV_PROJECT_ENVIRONMENT pins the venv to a known absolute path so the start command
# (railway.api.json / railway.agents.json) can call it deterministically.
# --all-packages installs EVERY workspace member into that one venv — required because the
# API imports the agents package in-process (assistant) and needs httpx at runtime.
providers = ["python"]

[variables]
UV_PROJECT_ENVIRONMENT = "/app/.venv"

[phases.setup]
nixPkgs = ["python313", "gcc"]

[phases.install]
cmds = ["pip install uv", "uv sync --all-packages"]

# Aegis ingestion pipeline (Vector) — starter template (INFRA-02 / BE-08).
# Pattern: collect -> parse -> VRL normalize to ECS -> sinks. Add one source block per
# connector (AWS/Azure/GCP/K8s/Cloudflare/Docker/Datadog/Okta/Syslog/HTTP/S3/Kafka).
#
# Normalized events are archived to local ./data + console and shipped to OpenSearch
# (t-{tenant}-events) — the sole telemetry/detection store. See docs/05 §8, docs/10.

sources:
  demo:
    type: demo_logs
    format: json
    interval: 5

transforms:
  # VRL normalization to ECS. Real per-source transforms map vendor fields -> ECS.
  normalize:
    type: remap
    inputs: [demo]
    source: |
      .tenant_id = "demo-tenant"
      .event = { "category": "network", "type": "allowed", "action": "accept" }
      .source = { "ip": "10.0.0.5" }
      .destination = { "ip": "8.8.8.8", "port": to_int!(random_int(1000, 1100)) }
      .["@timestamp"] = now()

sinks:
  archive:
    type: file
    inputs: [normalize]
    path: /data/archive/%Y-%m-%d/events.log
    encoding: { codec: json }

  console:
    type: console
    inputs: [normalize]
    encoding: { codec: json }

  # Telemetry/detection store — OpenSearch (local or a managed/remote cluster).
  opensearch:
    type: elasticsearch
    inputs: [normalize]
    endpoint: ${OPENSEARCH_URL:-http://opensearch:9200}
    mode: bulk
    api_version: v8
    auth:
      strategy: basic
      user: ${OPENSEARCH_USER:-}
      password: ${OPENSEARCH_PASSWORD:-}
    bulk:
      index: t-%{tenant_id}-events
    tls:
      verify_certificate: false
  #   skip_unknown_fields: true

# Aegis log collection pipeline (Logstash).
# Runs in the dev compose AND standalone on a VPS (see ../README.md).
# Inputs: Beats (Filebeat/Winlogbeat) on 5044, syslog on 5514 (tcp+udp).
# Normalizes minimal ECS fields + tenant tag, ships to OpenSearch (per-tenant index)
# and ClickHouse (aegis.events via HTTP).

input {
  beats { port => 5044 }
  syslog { port => 5514 }
}

filter {
  # Tenant is set per collector deployment (VPS env LOGSTASH_TENANT_ID).
  mutate {
    add_field => { "tenant_id" => "${LOGSTASH_TENANT_ID:11111111-1111-1111-1111-111111111111}" }
  }
  if ![event][category] { mutate { add_field => { "[event][category]" => "network" } } }
  if ![event][type]     { mutate { add_field => { "[event][type]" => "allowed" } } }
  if ![event][action]   { mutate { add_field => { "[event][action]" => "accept" } } }
  if ![host][name]      { mutate { add_field => { "[host][name]" => "%{host}" } } }
  if ![user][name]      { mutate { add_field => { "[user][name]" => "unknown" } } }
  if ![message]         { mutate { add_field => { "message" => "" } } }
  mutate {
    add_field => {
      "source_name" => "logstash"
      "log_index"   => "syslog-generic"
    }
  }
}

output {
  # Search plane — per-tenant index prefix enforces isolation (docs/04 §3.3).
  opensearch {
    hosts  => ["${OPENSEARCH_URL:http://opensearch:9200}"]
    index  => "t-%{tenant_id}-logs-%{+YYYY.MM.dd}"
    ssl_certificate_verification => false
  }

  # Analytics datalake — ClickHouse HTTP INSERT (JSONEachRow). Only always-present string
  # columns are sent; numeric/IP columns (dst_port, src_ip, dst_ip) take table defaults.
  http {
    url            => "${CLICKHOUSE_URL:http://clickhouse:8123}/?input_format_skip_unknown_fields=1&query=INSERT%20INTO%20aegis.events%20(tenant_id,%20source,%20%60index%60,%20host_name,%20user_name,%20event_category,%20event_type,%20event_action,%20raw,%20ecs)%20FORMAT%20JSONEachRow"
    http_method    => "post"
    format         => "json"
    content_type   => "application/json"
    mapping => {
      "tenant_id"      => "%{tenant_id}"
      "source"         => "%{source_name}"
      "index"          => "%{log_index}"
      "host_name"      => "%{[host][name]}"
      "user_name"      => "%{[user][name]}"
      "event_category" => "%{[event][category]}"
      "event_type"     => "%{[event][type]}"
      "event_action"   => "%{[event][action]}"
      "raw"            => "%{message}"
      "ecs"            => "{}"
    }
  }
}

# Aegis log collection pipeline (Logstash).
# Runs in the dev compose AND standalone on a VPS (see ../README.md).
# Inputs: Beats (Filebeat/Winlogbeat) on 5044, syslog on 5514 (tcp+udp).
# Normalizes minimal ECS fields + tenant tag and ships to OpenSearch (per-tenant index).
# OpenSearch is the sole telemetry/detection store — point OPENSEARCH_URL at your cluster
# (a managed/remote one works; set OPENSEARCH_USER/PASSWORD for a secured cluster).

input {
  beats { port => 5044 }
  syslog { port => 5514 }
}

filter {
  # Tenant is set per collector deployment (VPS env LOGSTASH_TENANT_ID).
  mutate {
    add_field => { "tenant_id" => "${LOGSTASH_TENANT_ID:11111111-1111-1111-1111-111111111111}" }
  }
  if ![event][category] { mutate { add_field => { "[event][category]" => "network" } } }
  if ![event][type]     { mutate { add_field => { "[event][type]" => "info" } } }
  if ![event][action]   { mutate { add_field => { "[event][action]" => "accept" } } }
  if ![host][name]      { mutate { add_field => { "[host][name]" => "%{host}" } } }
  if ![user][name]      { mutate { add_field => { "[user][name]" => "unknown" } } }
  if ![source_tool]     { mutate { add_field => { "source_tool" => "logstash" } } }
  if ![message]         { mutate { add_field => { "message" => "" } } }
}

output {
  # Detection / search / telemetry plane — per-tenant index prefix enforces isolation.
  # Writes into t-{tenant}-events so the detection engine + telemetry read it directly.
  opensearch {
    hosts    => ["${OPENSEARCH_URL:http://opensearch:9200}"]
    user     => "${OPENSEARCH_USER:}"
    password => "${OPENSEARCH_PASSWORD:}"
    index    => "t-%{tenant_id}-events"
    ssl_certificate_verification => false
  }
}

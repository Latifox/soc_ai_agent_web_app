[project]
name = "aegis-mcp-clickhouse"
version = "0.1.0"
description = "Aegis MCP server — tenant-scoped, read-only ClickHouse queries"
requires-python = ">=3.13"
dependencies = [
  "mcp>=1.2",
  "aegis-core",
]

[project.scripts]
mcp-clickhouse = "mcp_clickhouse.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_clickhouse"]

[tool.uv.sources]
aegis-core = { workspace = true }

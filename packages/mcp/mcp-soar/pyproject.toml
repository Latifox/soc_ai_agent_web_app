[project]
name = "aegis-mcp-soar"
version = "0.1.0"
description = "Aegis MCP server — SOAR response actions (approval-gated for destructive)"
requires-python = ">=3.13"
dependencies = ["mcp>=1.2", "aegis-core"]

[project.scripts]
mcp-soar = "mcp_soar.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_soar"]

[tool.uv.sources]
aegis-core = { workspace = true }

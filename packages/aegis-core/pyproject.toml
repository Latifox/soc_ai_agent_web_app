[project]
name = "aegis-core"
version = "0.0.0"
description = "Aegis shared core: settings, tenant context, logging, tracing, storage, ClickHouse, secrets."
requires-python = ">=3.13"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.2",
  "structlog>=24.1",
  "opentelemetry-api>=1.24",
  "opentelemetry-sdk>=1.24",
]

[project.optional-dependencies]
# Local in-process ClickHouse (default dev backend).
chdb = ["chdb>=2.0"]
# ClickHouse server backend (staging/prod).
server = ["clickhouse-connect>=0.7"]
# Ship OpenTelemetry spans to a collector.
otlp = ["opentelemetry-exporter-otlp-proto-http>=1.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_core"]

[tool.pytest.ini_options]
pythonpath = ["src"]
